name: Update Visual Baselines
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to generate baselines for'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          # PAT-free auto-commit path: we push back to the same branch with the
          # workflow's GITHUB_TOKEN. The default token has contents:write here
          # because of the top-level `permissions:` block.
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: cache puppeteer browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: ensure puppeteer chrome installed
        run: pnpm --filter @codevena/cvmake-templates exec puppeteer browsers install chrome
      - name: regenerate all visual baselines
        env:
          UPDATE_VISUAL: '1'
        run: pnpm --filter @codevena/cvmake-templates test:visual

      - name: upload baselines (artifact fallback)
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines-linux-${{ github.run_id }}
          path: packages/templates/__tests__/__visual__/**/*.page*.png
          retention-days: 7

      - name: commit + push refreshed baselines
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/templates/__tests__/__visual__/
          if git diff --staged --quiet; then
            echo "No baseline changes to commit."
            exit 0
          fi
          git commit -m "test(templates): refresh linux visual baselines [skip ci]

          Auto-generated by update-baselines.yml run ${{ github.run_id }}."
          git push origin "${{ inputs.branch }}"
