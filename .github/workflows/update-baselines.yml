name: Update Visual Baselines
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to generate baselines for (main/master not allowed)'
        required: true
        default: 'main'

# H6 fix: no workflow-level contents:write — scoped to the commit job only.
# ci.yml gets contents:read at workflow level as a hardening baseline.

jobs:
  generate:
    runs-on: ubuntu-latest
    # H6 fix: contents:write scoped to this job only, not workflow level.
    permissions:
      contents: write
    steps:
      # H6 fix: refuse to push directly to main/master.
      # Pass the input through `env:` (Actions resolves it BEFORE the shell
      # sees it), then read it via `$BRANCH` — this is shell-injection-safe
      # because expression interpolation never reaches the shell parser.
      - name: reject protected branches
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          # Normalize any "refs/heads/", "refs/remotes/origin/", "origin/" or
          # other ref prefix to just the branch leaf — so `refs/heads/main`,
          # `origin/master`, etc. all get caught by the protected-branch check
          # below.  Codex-B re-review flagged the naive leaf check as
          # bypassable via prefixed refs (H6 hardening, second pass).
          LEAF="${BRANCH##*/}"
          case "$LEAF" in
            main|master|production|release)
              echo "ERROR: Direct baseline updates to '$LEAF' (input '$BRANCH') are not allowed."
              echo "Create a feature branch and open a PR instead."
              exit 1
              ;;
          esac
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
          # PAT-free auto-commit path: we push back to the same branch with the
          # workflow's GITHUB_TOKEN. The contents:write permission above allows this.
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: cache puppeteer browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: ensure puppeteer chrome installed
        run: pnpm --filter @codevena/cvmake-templates exec puppeteer browsers install chrome
      - name: regenerate all visual baselines
        env:
          UPDATE_VISUAL: '1'
        run: pnpm --filter @codevena/cvmake-templates test:visual

      - name: upload baselines (artifact fallback)
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines-linux-${{ github.run_id }}
          path: packages/templates/__tests__/__visual__/**/*.page*.png
          retention-days: 7

      - name: commit + push refreshed baselines
        # H6 fix: use env var for branch name in shell to avoid expression injection.
        env:
          TARGET_BRANCH: ${{ inputs.branch }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/templates/__tests__/__visual__/
          if git diff --staged --quiet; then
            echo "No baseline changes to commit."
            exit 0
          fi
          git commit -m "test(templates): refresh linux visual baselines [skip ci]

          Auto-generated by update-baselines.yml run ${{ github.run_id }}."
          git push origin "$TARGET_BRANCH"
