name: CI
on:
  push: { branches: [main] }
  pull_request:

# H22/H6 hardening: least-privilege default — individual jobs add write only if needed.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR) so we don't
# burn minutes finishing stale builds and feedback arrives sooner.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: static (lint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # H22 fix: removed continue-on-error — lint must be a hard gate.
      # TODO: fix outstanding lint findings (60 known biome issues tracked separately)
      - name: lint
        run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  unit:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: cache puppeteer browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: ensure puppeteer chrome installed
        run: pnpm --filter @codevena/cvmake-core exec puppeteer browsers install chrome
      - run: pnpm build
      - run: pnpm -r test:unit

  # H23 fix: integration tests now run in CI (were missing before).
  integration:
    name: integration tests
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: cache puppeteer browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: ensure puppeteer chrome installed
        run: pnpm --filter @codevena/cvmake-core exec puppeteer browsers install chrome
      - run: pnpm build
      - run: pnpm turbo run test:integration

  e2e-visual:
    name: e2e + visual
    runs-on: ubuntu-latest
    needs: [static]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: cache playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: cache puppeteer browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: install playwright chromium
        run: pnpm --filter @codevena/cvmake-web exec playwright install --with-deps chromium

      - name: ensure puppeteer chrome installed
        run: pnpm --filter @codevena/cvmake-core exec puppeteer browsers install chrome

      - run: pnpm build

      - name: run e2e tests
        run: pnpm --filter @codevena/cvmake-web test:e2e

      - name: run visual tests
        run: pnpm --filter @codevena/cvmake-templates test:visual

      - name: upload visual artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs-${{ github.run_id }}
          path: |
            packages/templates/__tests__/__visual__/**/.actual/**
            apps/web/playwright-report/**
            apps/web/test-results/**
          if-no-files-found: ignore
          retention-days: 30
          include-hidden-files: true
