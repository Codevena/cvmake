name: Deploy showcase

on:
  push:
    branches: [main]
    paths:
      - 'apps/showcase/**'
      - 'docs/screenshots/**'
      - '.github/workflows/deploy-showcase.yml'
  workflow_dispatch:

# GitHub Pages requires these permissions on the deploy job.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. Queue but do not cancel in-flight deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v7
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: build showcase
        run: pnpm --filter @codevena/cvmake-showcase build

      - name: assemble showcase output
        run: |
          set -euo pipefail
          mkdir -p dist dist/screenshots
          # Copy every top-level file from the showcase directory EXCEPT the
          # build inputs (src/, package.json, node_modules, etc.).  This is
          # a "list what's NOT a build artifact" approach so future assets
          # (og-card, collage, robots/sitemap, additional PNGs) land in dist
          # without another workflow edit.
          for f in apps/showcase/*; do
            base="$(basename "$f")"
            case "$base" in
              # build inputs / local-dev artifacts that should not ship
              src|node_modules|package.json|tsconfig*.json|README.md) ;;
              # screenshots/ is a local sync mirror of docs/screenshots — the
              # canonical copy comes from docs/ below.
              screenshots) ;;
              *) cp -r "$f" "dist/$base" ;;
            esac
          done
          # Copy every PNG / WebP / AVIF in docs/screenshots/ — apps/showcase
          # references the .png src in <img> and avif/webp via <picture><source>.
          cp docs/screenshots/*.{png,webp,avif} dist/screenshots/ 2>/dev/null || true

      - name: configure pages
        uses: actions/configure-pages@v5

      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: deploy to github pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v4
