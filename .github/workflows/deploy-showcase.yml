name: Deploy showcase

on:
  push:
    branches: [main]
    paths:
      - 'apps/showcase/**'
      - 'docs/screenshots/**'
      - '.github/workflows/deploy-showcase.yml'
  workflow_dispatch:

# GitHub Pages requires these permissions on the deploy job.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. Queue but do not cancel in-flight deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: build showcase
        run: pnpm --filter @codevena/cvmake-showcase build

      - name: assemble showcase output
        run: |
          set -euo pipefail
          mkdir -p dist
          cp apps/showcase/index.html dist/
          cp apps/showcase/styles.css dist/
          cp apps/showcase/tailwind.css dist/
          cp apps/showcase/app.js dist/
          cp apps/showcase/favicon.svg dist/
          cp apps/showcase/CNAME dist/
          mkdir -p dist/screenshots
          cp docs/screenshots/*.png dist/screenshots/

      - name: configure pages
        uses: actions/configure-pages@v5

      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: deploy to github pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v4
